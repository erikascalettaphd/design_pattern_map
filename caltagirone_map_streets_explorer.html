  var streetLayers = {};
  var lyrTertiary = null, lyrMinor = null, lyrArrows = null;
  var lyrByTypeTert = null, lyrByTypeLong = null, lyrByTypeMinor = null;

  function getMidAndBearing(geometry) {
    var coords;
    if (geometry.type === 'LineString') coords = geometry.coordinates;
    else if (geometry.type === 'MultiLineString')
      coords = geometry.coordinates.reduce(function(a,b){return b.length>a.length?b:a;});
    else return null;
    if (coords.length < 2) return null;
    var mid = coords[Math.floor(coords.length/2)];
    var first = coords[0], last = coords[coords.length-1];
    var bearing = (Math.atan2(last[0]-first[0], last[1]-first[1])*180/Math.PI+360)%360;
    return {lat:mid[1], lng:mid[0], bearing:bearing};
  }

  function buildArrows(leafMap) {
    var markers = [];
    if (!RAW_EDGES) return L.layerGroup([]);
    RAW_EDGES.features.forEach(function(f) {
      var mb = getMidAndBearing(f.geometry);
      if (!mb) return;
      var oneway = f.properties.oneway;
      var arrow = oneway ? '&#9650;' : '&#8597;';
      var icon = L.divIcon({
        html:'<div style="transform:rotate('+mb.bearing+'deg);font-size:11px;color:#333;line-height:1">'+arrow+'</div>',
        iconSize:[14,14], iconAnchor:[7,7], className:''
      });
      markers.push(L.marker([mb.lat, mb.lng], {icon:icon}));
    });
    return L.layerGroup(markers);
  }

  function makeLayer(features, color, weight) {
    return L.geoJSON({type:'FeatureCollection',features:features},{
      style: function(){return {color:color,weight:weight,opacity:0.9};},
      onEachFeature: function(f,lyr){
        lyr.bindTooltip('<b>'+f.properties.name+'</b><br>'+
          f.properties.length_m+' m | bearing: '+f.properties.bearing_deg+'°');
      }
    });
  }

  var allSelected = false;

  window.toggleAllStreets = function() {
    var leafMap = window[MAP_VAR];
    if (!leafMap) return;
    allSelected = !allSelected;
    document.getElementById('btn-select-all').textContent = allSelected ? 'Deselect all' : 'Select all';
    document.querySelectorAll('.chk-street').forEach(function(chk) {
      chk.checked = allSelected;
      var nm = chk.getAttribute('data-street');
      if (!streetLayers[nm]) return;
      if (allSelected) streetLayers[nm].addTo(leafMap);
      else leafMap.removeLayer(streetLayers[nm]);
    });
  };

  function renderStreets() {
    var leafMap = window[MAP_VAR];
    if (!leafMap) { setTimeout(renderStreets, 200); return; }

    // Raggruppa per nome strada
    var byName = {};
    if (STREETS) {
      STREETS.features.forEach(function(f) {
        var p = f.properties;
        if (p.is_border || !p.is_main) return;
        if (!byName[p.name]) byName[p.name] = [];
        byName[p.name].push(f);
      });
    }

    // Un layer per strada (non aggiunto alla mappa di default)
    Object.keys(byName).forEach(function(nm) {
      var feats = byName[nm];
      var cls = feats[0].properties.cluster_id;
      var color = cls===1?'#4caf50':cls===2?'#ff9800':cls===3?'#ff5722':'#aaaaaa';
      streetLayers[nm] = makeLayer(feats, color, 3);
    });

    // Layer tertiary: solo segmenti OSM highway=tertiary (non aggiunto di default)
    lyrTertiary = TERTIARY_EDGES
      ? L.geoJSON(TERTIARY_EDGES, {style: function(){return {color:'#2196f3',weight:3,opacity:0.9};}})
      : L.layerGroup([]);

    // Layer strade minori - non aggiunto di default
    var minorFeats = [];
    if (STREETS) STREETS.features.forEach(function(f){
      if (!f.properties.is_main && !f.properties.is_border) minorFeats.push(f);
    });
    lyrMinor = makeLayer(minorFeats, '#aaaaaa', 1.5);

    lyrArrows = buildArrows(leafMap);

    // Layer "By type": terziarie / lunghe non terziarie / minori
    lyrByTypeTert = TERTIARY_EDGES
      ? L.geoJSON(TERTIARY_EDGES, {style: function(){return {color:'#2196f3',weight:3,opacity:0.9};}})
      : L.layerGroup([]);
    var longFeats = [];
    if (STREETS) STREETS.features.forEach(function(f){
      if (f.properties.is_main && !f.properties.has_tertiary && !f.properties.is_border) longFeats.push(f);
    });
    lyrByTypeLong = makeLayer(longFeats, '#ff9800', 3);
    lyrByTypeMinor = makeLayer(minorFeats, '#aaaaaa', 1.5);

    function deactivateAllPerStreet() {
      document.querySelectorAll('.chk-street').forEach(function(chk) {
        chk.checked = false;
        var nm = chk.getAttribute('data-street');
        if (streetLayers[nm]) leafMap.removeLayer(streetLayers[nm]);
      });
      allSelected = false;
      document.getElementById('btn-select-all').textContent = 'Select all';
    }

    function removeByTypeLayers() {
      leafMap.removeLayer(lyrByTypeTert);
      leafMap.removeLayer(lyrByTypeLong);
      leafMap.removeLayer(lyrByTypeMinor);
    }

    // Listeners checkbox strade
    document.querySelectorAll('.chk-street').forEach(function(chk) {
      chk.addEventListener('change', function() {
        var nm = chk.getAttribute('data-street');
        if (!streetLayers[nm]) return;
        if (chk.checked) streetLayers[nm].addTo(leafMap);
        else leafMap.removeLayer(streetLayers[nm]);
      });
    });

    document.getElementById('chk-tertiary').addEventListener('change', function() {
      if (this.checked) {
        deactivateAllPerStreet();
        document.getElementById('chk-by-type').checked = false;
        document.getElementById('by-type-legend').style.display = 'none';
        removeByTypeLayers();
        lyrTertiary.addTo(leafMap);
      } else {
        leafMap.removeLayer(lyrTertiary);
      }
    });

    document.getElementById('chk-by-type').addEventListener('change', function() {
      if (this.checked) {
        deactivateAllPerStreet();
        document.getElementById('chk-tertiary').checked = false;
        leafMap.removeLayer(lyrTertiary);
        document.getElementById('by-type-legend').style.display = 'block';
        lyrByTypeTert.addTo(leafMap);
        lyrByTypeLong.addTo(leafMap);
        lyrByTypeMinor.addTo(leafMap);
      } else {
        document.getElementById('by-type-legend').style.display = 'none';
        removeByTypeLayers();
      }
    });

    document.getElementById('chk-minor-v2').addEventListener('change', function() {
      if (this.checked) lyrMinor.addTo(leafMap); else leafMap.removeLayer(lyrMinor);
    });
    document.getElementById('chk-arrows-v2').addEventListener('change', function() {

  setTimeout(renderStreets, 800);
})();
