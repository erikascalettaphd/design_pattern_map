  var PARKING_GOOGLE = {"type": "FeatureCollection", "features": [{"type": "Feature", "properties": {"name": "Parcheggi moto", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5126293, 37.23772040000001]}}, {"type": "Feature", "properties": {"name": "Piazza del carmine", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5124756, 37.2388387]}}, {"type": "Feature", "properties": {"name": "Parcheggio via iudeca", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5112329, 37.2366145]}}, {"type": "Feature", "properties": {"name": "Via Acquanuova,", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5170357, 37.23852679999999]}}, {"type": "Feature", "properties": {"name": "Parcheggio bus turistici", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5173138, 37.2387873]}}, {"type": "Feature", "properties": {"name": "Parcheggio est", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5175639, 37.2387764]}}, {"type": "Feature", "properties": {"name": "Public Parking \ufe0f", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5137721, 37.2412357]}}, {"type": "Feature", "properties": {"name": "Parcheggio gratuito - Free Parking", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5134481, 37.24133929999999]}}, {"type": "Feature", "properties": {"name": "Free parking Caltagirone", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5144289, 37.2413939]}}, {"type": "Feature", "properties": {"name": "Parcheggio gratuito Caltagirone", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5086516, 37.2387921]}}, {"type": "Feature", "properties": {"name": "Parcheggio", "pattern": "Pattern 1"}, "geometry": {"type": "Point", "coordinates": [14.5151106, 37.2337842]}}]};
  var GREEN_GOOGLE = {"type": "FeatureCollection", "features": [{"type": "Feature", "properties": {"name": "Belvedere San Giorgio"}, "geometry": {"type": "Point", "coordinates": [14.5138206, 37.2413686]}}, {"type": "Feature", "properties": {"name": "Giardino Pubblico"}, "geometry": {"type": "Point", "coordinates": [14.5175466, 37.2321946]}}, {"type": "Feature", "properties": {"name": "Villa Comunale Di Caltagirone"}, "geometry": {"type": "Point", "coordinates": [14.5162116, 37.2330466]}}, {"type": "Feature", "properties": {"name": "Parco con fontana"}, "geometry": {"type": "Point", "coordinates": [14.5180417, 37.2319266]}}, {"type": "Feature", "properties": {"name": "TuliPark - Caltagirone"}, "geometry": {"type": "Point", "coordinates": [14.5202325, 37.2213135]}}, {"type": "Feature", "properties": {"name": "Villa Caruso"}, "geometry": {"type": "Point", "coordinates": [14.5202325, 37.2213135]}}, {"type": "Feature", "properties": {"name": "Piazza Falcone-Borsellino"}, "geometry": {"type": "Point", "coordinates": [14.5257856, 37.2198904]}}, {"type": "Feature", "properties": {"name": "Parco \"David Sassoli\""}, "geometry": {"type": "Point", "coordinates": [14.5212976, 37.21500839999999]}}, {"type": "Feature", "properties": {"name": "Parco con fontane"}, "geometry": {"type": "Point", "coordinates": [14.524256, 37.22270870000001]}}]};
  var streetLayers = {};
  var lyrTertiary = null, lyrMinor = null, lyrArrows = null;
  var lyrByTypeTert = null, lyrByTypeLong = null, lyrByTypeMinor = null;
  var lyrParking = null, lyrGreen = null;

  function getMidAndBearing(geometry) {
    var coords;
    if (geometry.type === 'LineString') coords = geometry.coordinates;
    else if (geometry.type === 'MultiLineString')
      coords = geometry.coordinates.reduce(function(a,b){return b.length>a.length?b:a;});
    else return null;
    if (coords.length < 2) return null;
    var mid = coords[Math.floor(coords.length/2)];
    var first = coords[0], last = coords[coords.length-1];
    var bearing = (Math.atan2(last[0]-first[0], last[1]-first[1])*180/Math.PI+360)%360;
    return {lat:mid[1], lng:mid[0], bearing:bearing};
  }

  function buildArrows(leafMap) {
    var markers = [];
    if (!RAW_EDGES) return L.layerGroup([]);
    RAW_EDGES.features.forEach(function(f) {
      var mb = getMidAndBearing(f.geometry);
      if (!mb) return;
      var oneway = f.properties.oneway;
      var arrow = oneway ? '&#9650;' : '&#8597;';
      var icon = L.divIcon({
        html:'<div style="transform:rotate('+mb.bearing+'deg);font-size:11px;color:#333;line-height:1">'+arrow+'</div>',
        iconSize:[14,14], iconAnchor:[7,7], className:''
      });
      markers.push(L.marker([mb.lat, mb.lng], {icon:icon}));
    });
    return L.layerGroup(markers);
  }

  function makeLayer(features, color, weight) {
    return L.geoJSON({type:'FeatureCollection',features:features},{
      style: function(){return {color:color,weight:weight,opacity:0.9};},
      onEachFeature: function(f,lyr){
        lyr.bindTooltip('<b>'+f.properties.name+'</b><br>'+
          f.properties.length_m+' m | bearing: '+f.properties.bearing_deg+'°');
      }
    });
  }

  var allSelected = false;

  window.toggleAllStreets = function() {
    var leafMap = window[MAP_VAR];
    if (!leafMap) return;
    allSelected = !allSelected;
    document.getElementById('btn-select-all').textContent = allSelected ? 'Deselect all' : 'Select all';
    document.querySelectorAll('.chk-street').forEach(function(chk) {
      chk.checked = allSelected;
      var nm = chk.getAttribute('data-street');
      if (!streetLayers[nm]) return;
      if (allSelected) streetLayers[nm].addTo(leafMap);
      else leafMap.removeLayer(streetLayers[nm]);
    });
  };

  function renderStreets() {
    var leafMap = window[MAP_VAR];
    if (!leafMap) { setTimeout(renderStreets, 200); return; }

    // Raggruppa per nome strada
    var byName = {};
    if (STREETS) {
      STREETS.features.forEach(function(f) {
        var p = f.properties;
        if (p.is_border || !p.is_main) return;
        if (!byName[p.name]) byName[p.name] = [];
        byName[p.name].push(f);
      });
    }

    // Un layer per strada (non aggiunto alla mappa di default)
    Object.keys(byName).forEach(function(nm) {
      var feats = byName[nm];
      var cls = feats[0].properties.cluster_id;
      var color = cls===1?'#4caf50':cls===2?'#ff9800':cls===3?'#ff5722':'#aaaaaa';
      streetLayers[nm] = makeLayer(feats, color, 3);
    });

    // Layer tertiary: solo segmenti OSM highway=tertiary (non aggiunto di default)
    lyrTertiary = TERTIARY_EDGES
      ? L.geoJSON(TERTIARY_EDGES, {style: function(){return {color:'#2196f3',weight:3,opacity:0.9};}})
      : L.layerGroup([]);

    // Layer strade minori - non aggiunto di default
    var minorFeats = [];
    if (STREETS) STREETS.features.forEach(function(f){
      if (!f.properties.is_main && !f.properties.is_border) minorFeats.push(f);
    });
    lyrMinor = makeLayer(minorFeats, '#aaaaaa', 1.5);

    lyrArrows = buildArrows(leafMap);

    // Layer parcheggi Google
    lyrParking = L.geoJSON(PARKING_GOOGLE || {type:'FeatureCollection',features:[]}, {
      pointToLayer: function(f, latlng) {
        return L.circleMarker(latlng, {radius:6, color:'#6d4c41', fillColor:'#6d4c41',
          fillOpacity:0.9, weight:0});
      },
      onEachFeature: function(f, lyr) { lyr.bindTooltip('<b>Parking</b><br>'+(f.properties.name||'—')); }
    });

    // Layer spazi verdi Google
    lyrGreen = L.geoJSON(GREEN_GOOGLE || {type:'FeatureCollection',features:[]}, {
      pointToLayer: function(f, latlng) {
        return L.circleMarker(latlng, {radius:6, color:'#388e3c', fillColor:'#388e3c',
          fillOpacity:0.9, weight:0});
      },
      onEachFeature: function(f, lyr) { lyr.bindTooltip('<b>Green Space</b><br>'+(f.properties.name||'—')); }
    });

    // Layer "By type": classificazione a livello di strada aggregata (per nome)
    // Terziaria = has_tertiary=1 (anche se mista); Lunga = has_tertiary=0 AND is_main=1
    var tertByTypeFeats = [], longByTypeFeats = [];
    if (STREETS) STREETS.features.forEach(function(f){
      var p = f.properties;
      if (p.is_border) return;
      if (p.has_tertiary) tertByTypeFeats.push(f);
      else if (p.is_main) longByTypeFeats.push(f);
    });
    lyrByTypeTert = makeLayer(tertByTypeFeats, '#2196f3', 3);
    lyrByTypeLong = makeLayer(longByTypeFeats, '#ff9800', 3);
    lyrByTypeMinor = makeLayer(minorFeats, '#aaaaaa', 1.5);

    function deactivateAllPerStreet() {
      document.querySelectorAll('.chk-street').forEach(function(chk) {
        chk.checked = false;
        var nm = chk.getAttribute('data-street');
        if (streetLayers[nm]) leafMap.removeLayer(streetLayers[nm]);
      });
      allSelected = false;
      document.getElementById('btn-select-all').textContent = 'Select all';
    }

    function removeByTypeLayers() {
      leafMap.removeLayer(lyrByTypeTert);
      leafMap.removeLayer(lyrByTypeLong);
      leafMap.removeLayer(lyrByTypeMinor);
    }

    // Listeners checkbox strade
    document.querySelectorAll('.chk-street').forEach(function(chk) {
      chk.addEventListener('change', function() {
        var nm = chk.getAttribute('data-street');
        if (!streetLayers[nm]) return;
        if (chk.checked) streetLayers[nm].addTo(leafMap);
        else leafMap.removeLayer(streetLayers[nm]);
      });
    });

    document.getElementById('chk-tertiary').addEventListener('change', function() {
      if (this.checked) {
        deactivateAllPerStreet();
        document.getElementById('chk-by-type').checked = false;
        document.getElementById('by-type-legend').style.display = 'none';
        removeByTypeLayers();
        lyrTertiary.addTo(leafMap);
      } else {
        leafMap.removeLayer(lyrTertiary);
      }
    });

    document.getElementById('chk-by-type').addEventListener('change', function() {
      if (this.checked) {
        deactivateAllPerStreet();
        document.getElementById('chk-tertiary').checked = false;
        leafMap.removeLayer(lyrTertiary);
        document.getElementById('by-type-legend').style.display = 'block';
        lyrByTypeTert.addTo(leafMap);
        lyrByTypeLong.addTo(leafMap);
        lyrByTypeMinor.addTo(leafMap);
      } else {
        document.getElementById('by-type-legend').style.display = 'none';
        removeByTypeLayers();
      }
    });

    document.getElementById('chk-minor-v2').addEventListener('change', function() {
      if (this.checked) lyrMinor.addTo(leafMap); else leafMap.removeLayer(lyrMinor);
    });
    document.getElementById('chk-arrows-v2').addEventListener('change', function() {
      if (this.checked) lyrArrows.addTo(leafMap); else leafMap.removeLayer(lyrArrows);
    });
    document.getElementById('chk-green-v2').addEventListener('change', function() {
      if (this.checked) lyrGreen.addTo(leafMap); else leafMap.removeLayer(lyrGreen);
    });
    document.getElementById('chk-parking-v2').addEventListener('change', function() {
      if (this.checked) lyrParking.addTo(leafMap); else leafMap.removeLayer(lyrParking);
    });
  }

  setTimeout(renderStreets, 800);
})();
</script>
